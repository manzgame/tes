<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANZGAME - Admin Panel</title>
    <!-- Gunakan Base Style & Tambahan Style Khusus Admin -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- DYNAMIC ISLAND NOTIFICATION -->
    <div id="dynamic-island" class="island-hidden">
        <span id="island-text">Notifikasi Admin</span>
    </div>

    <!-- GLOBAL PASSWORD POPUP (Diperlukan jika diakses langsung tanpa lewat publik) -->
    <div id="global-popup" class="popup-overlay">
        <div class="popup-box glass-panel">
            <div class="popup-brand-row">
                <span class="brand-text">MANZGAME</span>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
            <h2 class="popup-title">AKSES AWAL</h2>
            <p class="popup-desc">Masukkan password publik terlebih dahulu.</p>
            <div class="input-group">
                <input type="password" id="global-password" placeholder="Password Publik">
            </div>
            <button id="btn-verify-global" class="glass-btn btn-blue" onclick="verifyGlobalGate()">Verifikasi</button>
        </div>
    </div>

    <!-- ADMIN PASSWORD POPUP -->
    <div id="admin-popup" class="popup-overlay">
        <div class="popup-box glass-panel">
            <h2 class="popup-title">AKSES ADMIN</h2>
            <p class="popup-desc">Area terlarang. Masukkan password admin.</p>
            <div class="input-group">
                <input type="password" id="admin-password" placeholder="Password Admin">
            </div>
            <button id="btn-verify-admin" class="glass-btn btn-blue" style="margin-top: 10px;" onclick="verifyAdminGate()">Masuk Admin</button>
        </div>
    </div>

    <div id="app-wrapper" class="blurred admin-wrapper">
        <header id="main-header" class="glass-panel">
            <div class="header-left">
                <h1 id="header-title" style="display: flex; align-items: center; gap: 10px;">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                    ADMIN PANEL
                </h1>
            </div>
            <div class="header-right">
                <button class="theme-toggle icon-btn" onclick="toggleTheme()" title="Toggle Theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <button class="glass-btn btn-outline" style="padding: 6px 15px; font-size: 13px;" onclick="window.location.href='index.html'">Kembali Web</button>
            </div>
        </header>

        <main class="admin-grid">
            <!-- FORM TAMBAH/EDIT -->
            <section class="admin-form-section glass-panel">
                <h2>Kelola Konten</h2>
                <form id="admin-form" onsubmit="handleFormSubmit(event)">
                    <div class="form-row">
                        <div class="input-group" style="flex: 1;">
                            <label>Document ID</label>
                            <input type="text" id="v-id" required>
                        </div>
                        <button type="button" class="glass-btn btn-outline btn-auto" onclick="generateAutoId()">Auto ID</button>
                    </div>

                    <div class="input-group">
                        <label>Judul Video</label>
                        <input type="text" id="v-title" required>
                    </div>

                    <div class="input-group">
                        <label>Upload Thumbnail (Otomatis ke Cloudinary)</label>
                        <input type="file" id="v-thumb-file" accept="image/*" onchange="uploadToCloudinary(this)">
                        <div id="upload-status" style="font-size: 12px; color: var(--accent-blue); margin-top: 5px; display: none;">Mengunggah...</div>
                    </div>

                    <div class="input-group">
                        <label>URL Thumbnail</label>
                        <input type="url" id="v-thumbnail" required>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Link Password</label>
                            <input type="url" id="v-pw-link" required>
                        </div>
                        <div class="input-group">
                            <label>Link No Password</label>
                            <input type="url" id="v-nopw-link" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Password Video</label>
                            <input type="text" id="v-pw" required>
                        </div>
                        <div class="input-group">
                            <label>Link YouTube</label>
                            <input type="url" id="v-yt-link" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Upload Date</label>
                            <input type="datetime-local" id="v-upload" required>
                        </div>
                        <div class="input-group">
                            <label>Expiry Date</label>
                            <input type="datetime-local" id="v-expiry" required>
                        </div>
                    </div>

                    <div class="input-group switch-group">
                        <label>Publish Status</label>
                        <label class="switch">
                            <input type="checkbox" id="v-published" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btn-save" class="glass-btn btn-blue">Simpan Video</button>
                        <button type="button" class="glass-btn btn-outline" onclick="resetForm()">Reset Form</button>
                    </div>
                </form>
            </section>

            <!-- DAFTAR VIDEO -->
            <section class="admin-list-section glass-panel">
                <h2>Daftar Database</h2>
                <div class="list-container" id="admin-list">
                    <!-- List Item Injected by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANZGAME - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* RE-DESIGN ADMIN PANEL (EMBEDDED) */
        body { background-color: var(--bg-color); transition: all 0.3s ease; }
        
        .admin-header {
            position: sticky; top: 0; z-index: 100; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 0 0 24px 24px; border-top: none;
            backdrop-filter: blur(30px); background: var(--glass-bg); box-shadow: var(--glass-shadow);
            width: 100%; box-sizing: border-box;
        }
        .admin-header h1 { font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 10px; color: var(--text-main); }
        .admin-layout {
            display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr); gap: 30px;
            max-width: 1300px; margin: 30px auto; padding: 0 5%; align-items: start;
            width: 100%; box-sizing: border-box;
        }
        @media(max-width: 900px) { .admin-layout { grid-template-columns: minmax(0, 1fr); } }
        
        .admin-card { 
            padding: 25px; border-radius: 20px; background: var(--glass-bg); 
            border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); 
            min-width: 0; width: 100%; box-sizing: border-box;
        }
        .admin-card h2 { font-size: 18px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;}
        
        /* FORM STYLES */
        .form-grid { display: grid; gap: 15px; width: 100%; min-width: 0; }
        .form-row { display: flex; gap: 15px; width: 100%; min-width: 0; box-sizing: border-box; }
        .form-row > * { flex: 1; min-width: 0; box-sizing: border-box; }
        @media(max-width: 600px) { .form-row { flex-direction: column; } }
        
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input { 
            width: 100%; padding: 12px 15px; border-radius: 12px; 
            background: rgba(128,128,128,0.08); border: 1px solid var(--glass-border); 
            color: var(--text-main); font-size: 14px; outline: none; transition: all 0.2s;
            box-sizing: border-box; min-width: 0;
        }
        .form-group input:focus { border-color: var(--accent-blue); background: rgba(128, 128, 128, 0.12); }
        
        /* Thumbnail Preview Upload */
        .thumb-preview-area {
            display: flex; gap: 15px; align-items: center; padding: 10px; border-radius: 14px;
            background: rgba(128,128,128,0.05); border: 1px dashed var(--glass-border); margin-bottom: 15px;
            flex-wrap: wrap; width: 100%; box-sizing: border-box;
        }
        .thumb-preview { width: 100px; height: 56px; border-radius: 8px; object-fit: cover; background: #000; flex-shrink: 0;}
        .upload-btn-wrap { flex: 1; min-width: 0; position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 5px; }
        .upload-btn-wrap input[type=file] { position: absolute; top: 0; right: 0; min-width: 100%; min-height: 100%; opacity: 0; cursor: pointer; }
        .btn-upload-fake { display: inline-flex; justify-content: center; align-items: center; gap: 8px; padding: 10px; background: var(--accent-blue); color: #fff; font-size: 13px; font-weight: 600; border-radius: 10px; pointer-events: none; white-space: normal; text-align: center;}
        #upload-status { font-size: 12px; font-weight: 600; word-break: break-word;}

        /* Switch */
        .switch-wrap { 
            display: flex; align-items: center; justify-content: space-between; padding: 15px; 
            background: rgba(128,128,128,0.05); border-radius: 12px; border: 1px solid var(--glass-border); margin-top: 10px;
            gap: 15px; width: 100%; box-sizing: border-box;
        }
        .switch-wrap > div { flex: 1; min-width: 0; }
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(128,128,128,0.3); transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input:checked + .slider { background-color: var(--accent-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* LIST DATABASE STYLES */
        .list-wrap { display: flex; flex-direction: column; gap: 12px; max-height: 75vh; overflow-y: auto; padding-right: 5px; width: 100%; min-width: 0; }
        .db-item { 
            display: flex; align-items: center; gap: 15px; padding: 12px; 
            background: rgba(128,128,128,0.05); border-radius: 14px; border: 1px solid transparent; 
            transition: all 0.2s; width: 100%; box-sizing: border-box; min-width: 0;
        }
        .db-item:hover { background: rgba(128,128,128,0.1); border-color: var(--glass-border); }
        .db-thumb { width: 90px; height: 50px; border-radius: 8px; object-fit: cover; background: #000; flex-shrink: 0;}
        .db-info { flex: 1; overflow: hidden; min-width: 0;}
        .db-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px;}
        .db-meta { display: flex; gap: 10px; font-size: 11px; color: var(--text-sub); align-items: center; flex-wrap: wrap;}
        
        .badge { padding: 3px 8px; border-radius: 6px; font-weight: 700; font-size: 10px; }
        .badge-pub { background: rgba(48, 209, 88, 0.15); color: var(--accent-green); }
        .badge-hid { background: rgba(255, 69, 58, 0.15); color: var(--error-color); }

        .action-btns { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-act { width: 34px; height: 34px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: #fff; }
        .btn-act:hover { transform: translateY(-2px); }
        .btn-act.edit { background: var(--accent-blue); }
        .btn-act.del { background: var(--error-color); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius: 10px; }

        /* RESPONSIVE PADDING ADJUSTMENTS */
        @media(max-width: 600px) {
            .admin-header { padding: 15px; }
            .admin-layout { padding: 0 15px; margin: 15px auto; gap: 15px; }
            .admin-card { padding: 15px; }
            .thumb-preview-area { flex-direction: column; align-items: stretch; text-align: center; }
            .thumb-preview { width: 100%; height: auto; aspect-ratio: 16/9; }
            .switch-wrap { flex-direction: column; align-items: flex-start; gap: 10px; }
            .db-item { flex-direction: column; align-items: stretch; }
            .db-thumb { width: 100%; height: auto; aspect-ratio: 16/9; }
            .action-btns { justify-content: flex-end; }
        }
    </style>
</head>
<body>

    <!-- GATES -->
    <div id="dynamic-island" class="island-hidden">
        <span id="island-text">Notifikasi</span>
    </div>

    <!-- GLOBAL PASSWORD -->
    <div id="global-popup" class="popup-overlay">
        <div class="popup-box glass-panel">
            <h2 class="popup-title">Akses Awal</h2>
            <p class="popup-desc">Sistem mendeteksi akses baru. Masukkan password Publik.</p>
            <div class="input-group">
                <input type="password" id="global-password" placeholder="Password Publik">
            </div>
            <button class="glass-btn btn-blue" onclick="verifyGlobalGate()">Verifikasi</button>
        </div>
    </div>

    <!-- ADMIN PASSWORD -->
    <div id="admin-popup" class="popup-overlay">
        <div class="popup-box glass-panel">
            <h2 class="popup-title">Otorisasi Admin</h2>
            <p class="popup-desc">Masukkan password khusus Admin.</p>
            <div class="input-group">
                <input type="password" id="admin-password" placeholder="Password Admin">
            </div>
            <button class="glass-btn btn-blue" onclick="verifyAdminGate()">Masuk Panel</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-wrapper" class="blurred">
        
        <header class="admin-header">
            <h1>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                Dashboard
            </h1>
            <div style="display: flex; gap: 10px;">
                <button class="icon-btn" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
                <button class="glass-btn btn-outline" style="padding: 8px 15px; font-size: 13px;" onclick="window.location.href='index.html'">Website Utama</button>
            </div>
        </header>

        <main class="admin-layout">
            <!-- KIRI: EDITOR -->
            <section class="admin-card">
                <h2>
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Editor Konten
                </h2>
                <form id="admin-form" class="form-grid" onsubmit="handleFormSubmit(event)">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Document ID</label>
                            <input type="text" id="v-id" placeholder="Cth: video1" required>
                        </div>
                        <button type="button" class="glass-btn btn-outline" style="margin-top:20px;" onclick="generateAutoId()">Auto ID</button>
                    </div>

                    <div class="form-group">
                        <label>Judul Video</label>
                        <input type="text" id="v-title" placeholder="Masukkan judul..." required>
                    </div>

                    <!-- Area Upload -->
                    <div class="thumb-preview-area">
                        <img src="" id="thumb-img-preview" class="thumb-preview" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 56%22><rect width=%22100%22 height=%2256%22 fill=%22%23333%22/></svg>'">
                        <div class="upload-btn-wrap">
                            <div class="btn-upload-fake">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                Upload Gambar
                            </div>
                            <input type="file" id="v-thumb-file" accept="image/*" onchange="uploadToCloudinary(this)">
                            <span id="upload-status" style="color:var(--text-sub);">Max 5MB (Otomatis ke Cloudinary)</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>URL Thumbnail (Otomatis terisi jika upload)</label>
                        <input type="url" id="v-thumbnail" placeholder="https://..." oninput="document.getElementById('thumb-img-preview').src=this.value" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Link Password</label>
                            <input type="url" id="v-pw-link" required>
                        </div>
                        <div class="form-group">
                            <label>Link No Password</label>
                            <input type="url" id="v-nopw-link" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Password Video</label>
                            <input type="text" id="v-pw" required>
                        </div>
                        <div class="form-group">
                            <label>Link YouTube</label>
                            <input type="url" id="v-yt-link" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Tanggal Upload</label>
                            <input type="datetime-local" id="v-upload" required>
                        </div>
                        <div class="form-group">
                            <label>Tanggal Kadaluarsa</label>
                            <input type="datetime-local" id="v-expiry" required>
                        </div>
                    </div>

                    <div class="switch-wrap">
                        <div>
                            <span style="font-size: 14px; font-weight: 700;">Status Publikasi</span>
                            <p style="font-size: 11px; color: var(--text-sub); margin-top: 2px;">Tampilkan video di website publik</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="v-published" checked>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                        <button type="button" class="glass-btn btn-outline" style="flex:1;" onclick="resetForm()">Reset Form</button>
                        <button type="submit" id="btn-save" class="glass-btn btn-blue" style="flex:2;">Simpan Data</button>
                    </div>
                </form>
            </section>

            <!-- KANAN: DATABASE -->
            <section class="admin-card">
                <h2>
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                    Database Video
                </h2>
                <div class="list-wrap" id="admin-list">
                    <p style="text-align:center; padding: 20px; color:var(--text-sub);">Memuat database...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- LOGIKA ADMIN -->
    <script type="module">
        import { getAllVideosForAdmin, saveVideo, deleteVideo } from './firebase.js';

        let allVideosAdmin = [];
        const elAppWrapper = document.getElementById('app-wrapper');
        const elGlobalPopup = document.getElementById('global-popup');
        const elAdminPopup = document.getElementById('admin-popup');

        // ==== GATES ====
        document.addEventListener('DOMContentLoaded', () => {
            let savedTheme = localStorage.getItem('theme');
            if (!savedTheme) {
                savedTheme = 'dark';
                localStorage.setItem('theme', 'dark');
            }
            document.documentElement.setAttribute('data-theme', savedTheme);

            if (!hasValidPublicAccess()) {
                elGlobalPopup.classList.add('active');
            } else if (!hasValidAdminAccess()) {
                elAdminPopup.classList.add('active');
            } else {
                unlockAdminPanel();
            }
        });

        function hasValidPublicAccess() {
            try {
                const access = JSON.parse(localStorage.getItem('manzgame_access'));
                if (access && Date.now() < access.expiresAt) return true;
            } catch(e) {}
            return false;
        }

        function hasValidAdminAccess() {
            return localStorage.getItem('manzgame_admin_access') === 'true';
        }

        window.verifyGlobalGate = () => {
            if (document.getElementById('global-password').value === 'qwert67') {
                const expiresAt = Date.now() + (60 * 60 * 1000);
                localStorage.setItem('manzgame_access', JSON.stringify({ granted: true, expiresAt }));
                elGlobalPopup.classList.remove('active');
                if (!hasValidAdminAccess()) elAdminPopup.classList.add('active');
                else unlockAdminPanel();
            } else alert("Password Publik Salah");
        }

        window.verifyAdminGate = () => {
            if (document.getElementById('admin-password').value === 'yuhu67') {
                localStorage.setItem('manzgame_admin_access', 'true');
                elAdminPopup.classList.remove('active');
                unlockAdminPanel();
            } else alert("Password Admin Salah");
        }

        function unlockAdminPanel() {
            elAppWrapper.classList.remove('blurred');
            loadAdminData();
            document.getElementById('v-upload').value = formatToDatetimeLocal(new Date());
        }

        // ==== DATA LOGIC ====
        async function loadAdminData() {
            allVideosAdmin = await getAllVideosForAdmin();
            renderAdminList();
        }

        function renderAdminList() {
            const listContainer = document.getElementById('admin-list');
            listContainer.innerHTML = '';
            
            if(allVideosAdmin.length === 0){
                listContainer.innerHTML = `<p style="text-align:center; padding:20px; color:var(--text-sub);">Database Kosong</p>`;
                return;
            }

            allVideosAdmin.forEach(v => {
                const isPub = v.isPublished !== false;
                const bClass = isPub ? 'badge-pub' : 'badge-hid';
                const bText = isPub ? 'PUBLISHED' : 'HIDDEN';

                // Safe parsing for display
                const dDate = new Date(v.uploadDate);
                const dateStr = !isNaN(dDate.getTime()) ? dDate.toLocaleDateString('id-ID') : 'No Date';

                const item = document.createElement('div');
                item.className = 'db-item';
                item.innerHTML = `
                    <img src="${v.thumbnail}" class="db-thumb" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 56%22><rect width=%22100%22 height=%2256%22 fill=%22%23222%22/></svg>'">
                    <div class="db-info">
                        <div class="db-title">${v.title}</div>
                        <div class="db-meta">
                            <span class="badge ${bClass}">${bText}</span>
                            <span>ID: ${v.id}</span>
                            <span>• ${dateStr}</span>
                        </div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-act edit" onclick="editVideo('${v.id}')" title="Edit">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="btn-act del" onclick="delVideo('${v.id}')" title="Hapus">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        </button>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        // ==== FORM ACTIONS ====
        window.generateAutoId = () => {
            if (allVideosAdmin.length === 0) { document.getElementById('v-id').value = 'video1'; return; }
            let maxNum = 0;
            allVideosAdmin.forEach(v => {
                const match = v.id.match(/\d+$/);
                if (match) {
                    const num = parseInt(match[0], 10);
                    if (num > maxNum) maxNum = num;
                }
            });
            document.getElementById('v-id').value = `video${maxNum + 1}`;
        };

        window.uploadToCloudinary = async (inputElement) => {
            const file = inputElement.files[0];
            if (!file) return;

            const btnSave = document.getElementById('btn-save');
            const statusText = document.getElementById('upload-status');
            
            btnSave.disabled = true;
            statusText.style.color = 'var(--accent-blue)';
            statusText.innerText = "Mengunggah gambar...";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'manzgame'); 

            try {
                const res = await fetch('https://api.cloudinary.com/v1_1/dfechxl6d/image/upload', {
                    method: 'POST', body: formData
                });
                const data = await res.json();
                if(data.secure_url) {
                    document.getElementById('v-thumbnail').value = data.secure_url;
                    document.getElementById('thumb-img-preview').src = data.secure_url;
                    statusText.innerText = "Upload Berhasil!";
                    statusText.style.color = "var(--accent-green)";
                } else throw new Error("Gagal mengurai URL");
            } catch (e) {
                statusText.innerText = "Upload Gagal!";
                statusText.style.color = "var(--error-color)";
            } finally {
                btnSave.disabled = false;
            }
        };

        window.handleFormSubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('v-id').value.trim();
            if(!id) return alert("Document ID wajib diisi!");

            const btnSave = document.getElementById('btn-save');
            btnSave.innerText = "Menyimpan...";
            btnSave.disabled = true;

            const payload = {
                title: document.getElementById('v-title').value,
                thumbnail: document.getElementById('v-thumbnail').value,
                passwordLink: document.getElementById('v-pw-link').value,
                noPasswordLink: document.getElementById('v-nopw-link').value,
                videoPassword: document.getElementById('v-pw').value,
                youtubePasswordLink: document.getElementById('v-yt-link').value,
                uploadDate: new Date(document.getElementById('v-upload').value).toISOString(),
                expiryDate: new Date(document.getElementById('v-expiry').value).toISOString(),
                isPublished: document.getElementById('v-published').checked
            };

            try {
                await saveVideo(id, payload);
                resetForm();
                loadAdminData();
                showNotif("Video Berhasil Disimpan!");
            } catch (error) {
                alert("Gagal menyimpan: " + error.message);
            } finally {
                btnSave.innerText = "Simpan Data";
                btnSave.disabled = false;
            }
        };

        window.editVideo = (id) => {
            const v = allVideosAdmin.find(video => video.id === id);
            if (!v) return;

            document.getElementById('v-id').value = v.id;
            document.getElementById('v-title').value = v.title || '';
            document.getElementById('v-thumbnail').value = v.thumbnail || '';
            document.getElementById('thumb-img-preview').src = v.thumbnail || '';
            document.getElementById('v-pw-link').value = v.passwordLink || '';
            document.getElementById('v-nopw-link').value = v.noPasswordLink || '';
            document.getElementById('v-pw').value = v.videoPassword || '';
            document.getElementById('v-yt-link').value = v.youtubePasswordLink || '';
            
            // Safe date parsing for edit form
            const upDate = new Date(v.uploadDate);
            const expDate = new Date(v.expiryDate);
            document.getElementById('v-upload').value = formatToDatetimeLocal(!isNaN(upDate.getTime()) ? upDate : new Date());
            document.getElementById('v-expiry').value = formatToDatetimeLocal(!isNaN(expDate.getTime()) ? expDate : new Date());
            
            document.getElementById('v-published').checked = v.isPublished !== false;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.delVideo = async (id) => {
            if (confirm(`Yakin ingin MENGHAPUS permanen video (${id})?`)) {
                try {
                    await deleteVideo(id);
                    loadAdminData();
                    showNotif("Video Dihapus");
                } catch (e) {
                    alert("Gagal Menghapus: " + e.message);
                }
            }
        };

        window.resetForm = () => {
            document.getElementById('admin-form').reset();
            document.getElementById('v-upload').value = formatToDatetimeLocal(new Date());
            document.getElementById('thumb-img-preview').src = '';
            document.getElementById('upload-status').innerText = 'Max 5MB (Otomatis ke Cloudinary)';
            document.getElementById('upload-status').style.color = 'var(--text-sub)';
        };

        function formatToDatetimeLocal(dateObj) {
            if (!(dateObj instanceof Date) || isNaN(dateObj)) return '';
            const d = new Date(dateObj);
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().slice(0, 16);
        }

        function showNotif(msg) {
            const island = document.getElementById('dynamic-island');
            document.getElementById('island-text').innerText = msg;
            island.classList.remove('island-hidden');
            setTimeout(() => island.classList.add('island-expanded'), 50);
            setTimeout(() => {
                island.classList.remove('island-expanded');
                setTimeout(() => island.classList.add('island-hidden'), 500);
            }, 3000);
        }

        window.toggleTheme = () => {
            const root = document.documentElement;
            const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MANZGAME</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        let initTheme = localStorage.getItem('theme');
        if (!initTheme) {
            initTheme = 'dark';
            localStorage.setItem('theme', 'dark');
        }
        document.documentElement.setAttribute('data-theme', initTheme);
    </script>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- GLOBAL PASSWORD POPUP (Gate 1 Admin) -->
    <div id="global-popup" class="popup-overlay">
        <div class="popup-box glass-panel">
            <div class="popup-brand-row">
                <span class="brand-text">MANZGAME ADMIN</span>
            </div>
            <h2 class="popup-title">AKSES PUBLIK</h2>
            <div class="input-group">
                <input type="password" id="global-password" placeholder="Password Publik">
                <button class="toggle-eye" onclick="togglePassword('global-password', this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <button id="btn-verify-global" class="glass-btn btn-blue" onclick="verifyGlobalGate()">Verifikasi Publik</button>
        </div>
    </div>

    <!-- ADMIN PASSWORD POPUP (Gate 2 Admin) -->
    <div id="admin-popup" class="popup-overlay">
        <div class="popup-box glass-panel">
            <div class="popup-brand-row">
                <span class="brand-text">MANZGAME ADMIN</span>
            </div>
            <h2 class="popup-title">AKSES ADMIN KHUSUS</h2>
            <div class="input-group">
                <input type="password" id="admin-password" placeholder="Password Admin">
                <button class="toggle-eye" onclick="togglePassword('admin-password', this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <button id="btn-verify-admin" class="glass-btn btn-blue" onclick="verifyAdminGate()" style="margin-top: 15px;">Masuk Admin Panel</button>
        </div>
    </div>

    <!-- MAIN APP WRAPPER (BLURRED INITIALLY) -->
    <div id="app-wrapper" class="blurred admin-wrapper">
        
        <header id="main-header" class="glass-panel" style="margin-bottom: 25px;">
            <div class="header-left">
                <h1 id="header-title">PANEL ADMIN</h1>
            </div>
            <div class="header-right">
                <button class="glass-btn btn-outline" style="padding: 8px 15px; font-size: 13px;" onclick="window.location.href='index.html'">Kembali Ke Web</button>
                <button class="theme-toggle icon-btn" onclick="toggleTheme()" title="Toggle Theme">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </header>

        <main class="admin-grid">
            <!-- SECTION FORM INPUT -->
            <section class="admin-form-section glass-panel">
                <h2>Kelola Video</h2>
                
                <!-- PREVIEW THUMBNAIL -->
                <div class="preview-wrapper">
                    <img id="thumb-preview" src="data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22400%22%20height%3D%22225%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20400%20225%22%20preserveAspectRatio%3D%22none%22%3E%3Crect%20width%3D%22400%22%20height%3D%22225%22%20fill%3D%22%231e2028%22%2F%3E%3Ctext%20x%3D%22200%22%20y%3D%22112.5%22%20fill%3D%22%23a0a0a5%22%20font-family%3D%22sans-serif%22%20font-size%3D%2218%22%20font-weight%3D%22600%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22middle%22%3ENo%20Image%20Preview%3C%2Ftext%3E%3C%2Fsvg%3E" alt="Preview Thumbnail">
                </div>

                <form id="admin-form" onsubmit="handleFormSubmit(event)">
                    <div class="form-row">
                        <div class="input-group">
                            <label>Video ID</label>
                            <input type="text" id="v-id" required>
                        </div>
                        <button type="button" class="glass-btn btn-outline btn-auto" onclick="generateAutoId()">Auto ID</button>
                    </div>
                    <div class="input-group">
                        <label>Judul Video</label>
                        <input type="text" id="v-title" required>
                    </div>
                    <div class="input-group">
                        <label>Upload Thumbnail</label>
                        <input type="file" id="v-file" accept="image/*" onchange="uploadToCloudinary(this)" style="margin-bottom: 5px; font-size: 13px; padding-left: 10px;">
                        <p id="upload-status" style="display:none; font-size: 12px; margin-bottom: 5px;"></p>
                    </div>
                    <div class="input-group">
                        <label>URL Thumbnail</label>
                        <input type="url" id="v-thumbnail" placeholder="https://res.cloudinary..." required>
                    </div>
                    <div class="input-group">
                        <label>Link Video (Password)</label>
                        <input type="url" id="v-pw-link" required>
                    </div>
                    <div class="input-group">
                        <label>Link Video (Tanpa Password)</label>
                        <input type="url" id="v-nopw-link" required>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label>Password Video</label>
                            <input type="text" id="v-pw" required>
                        </div>
                        <div class="input-group">
                            <label>Link YT (Lihat Password)</label>
                            <input type="url" id="v-yt-link" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label>Waktu Upload</label>
                            <input type="datetime-local" id="v-upload" required>
                        </div>
                        <div class="input-group">
                            <label>Waktu Expired</label>
                            <input type="datetime-local" id="v-expiry" required>
                        </div>
                    </div>
                    <div class="switch-group">
                        <div>
                            <label>Publish Status</label>
                            <p style="font-size:11px; color:var(--text-sub); margin-top:3px;">Tampilkan video ke publik?</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="v-published" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="btn-save" class="glass-btn btn-blue">Simpan Video</button>
                        <button type="button" class="glass-btn btn-outline" onclick="resetForm()">Reset Form</button>
                    </div>
                </form>
            </section>

            <!-- SECTION LIST DATABASE (BERUBAH MENJADI SELEKTOR) -->
            <section class="admin-list-section glass-panel">
                <h2>Database Video Khusus</h2>
                
                <div class="input-group" style="margin-bottom: 20px;">
                    <label>Pilih Video untuk Diedit/Dihapus</label>
                    <select id="video-select" class="custom-select" onchange="handleVideoSelect()">
                        <option value="">-- Memuat Data... --</option>
                    </select>
                </div>

                <div id="selected-video-container" class="list-container">
                    <!-- Javascript merender 1 video terfokus disini -->
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="admin.js"></script>
    <script>
        // Internal toggle untuk halaman admin agar input mata bekerja
        window.togglePassword = (inputId, btn) => {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
            btn.style.color = input.type === "text" ? "var(--accent-blue)" : "var(--text-sub)";
        };
    </script>
</body>
</html>
